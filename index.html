<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Adventure</title>
  <style>
    body {
      background: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .story-container {
      position: relative;
      width: 90vw;
      max-width: 600px;
      margin-top: 40px;
      display: block;
    }
    .story-img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      object-fit: cover;
      display: block;
    }
    .affirm-btn {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 28%;
      font-size: 3em;
      font-weight: bold;
      background: #d32f2f;
      color: #111;
      border: none;
      border-radius: 16px;
      padding: 32px 80px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: background 0.2s;
      z-index: 2;
    }
    .affirm-btn:hover {
      background: #b71c1c;
    }
    .scene2 {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 48px;
      position: relative;
      width: 100vw;
      min-height: 100vh;
      justify-content: flex-start;
      background: none;
    }
    .scene2-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      object-fit: cover;
      pointer-events: none;
    }
    .scene-img {
      width: 340px;
      height: auto;
      margin-bottom: 32px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      object-fit: cover;
      z-index: 1;
      margin-top: 64px;
    }
    .speech-bubble {
      min-width: 320px;
      max-width: 90vw;
      min-height: 120px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      padding: 36px 48px;
      font-size: 3em;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }
    .speech-bubble:after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -24px;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 24px solid transparent;
      border-right: 24px solid transparent;
      border-top: 24px solid #fff;
    }
  </style>
</head>
<body>
  <div class="story-container" id="scene1">
    <img src="chinesebackground.png" alt="Chinese Background" class="story-img" id="storyImg">
    <button class="affirm-btn" id="affirmBtn">AFFIRM</button>
  </div>
  <div class="scene2" id="scene2">
    <img src="background2.png" alt="Background 2" class="scene2-bg">
    <img src="xinjinping.png" alt="Xin Jin Ping" class="scene-img">
    <div class="speech-bubble" id="bubble"></div>
  </div>
  <script>
    const affirmBtn = document.getElementById('affirmBtn');
    const scene1 = document.getElementById('scene1');
    const scene2 = document.getElementById('scene2');
    const bubble = document.getElementById('bubble');
    affirmBtn.addEventListener('click', () => {
      scene1.style.display = 'none';
      scene2.style.display = 'flex';
      // Start typing effect
      const text = "hello.";
      let i = 0;
      function typeEffect() {
        if (i <= text.length) {
          bubble.textContent = text.slice(0, i);
          i++;
          setTimeout(typeEffect, 120);
        }
      }
      typeEffect();
    });
  </script>
</body>
</html>
